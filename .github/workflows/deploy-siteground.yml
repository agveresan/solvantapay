# Plan A: build on GitHub Actions, upload dist/ via FTP.
# Required repo secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_PORT
# Optional: PUBLIC_APPLY_URL, PUBLIC_SITE_URL (see DEPLOY-SITEGROUND.md)
# Remote path: SiteGround often uses domain/public_html/ (not account-root public_html).
# Override with repo variable FTP_SERVER_DIR if your layout differs (Settings → Variables → Actions).

name: Deploy static site to SiteGround

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you run deploy manually from Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Use Node 24 for JS actions (checkout, setup-node, FTP deploy) — avoids Node 20 deprecation warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate FTP server hostname (prevents ENOTFOUND)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "${FTP_SERVER:-}" ]; then
            echo "::error::Secret FTP_SERVER is empty. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          if printf '%s' "$FTP_SERVER" | grep -qE '^(ftp|http|https)://|[[:space:]]|/'; then
            echo "::error::FTP_SERVER must be the hostname only — no ftp://, no http://, no path, no spaces."
            echo "Example: ftp.solvantapay.com or the exact host shown in Site Tools → FTP."
            exit 1
          fi
      - name: Build
        env:
          PUBLIC_APPLY_URL: ${{ secrets.PUBLIC_APPLY_URL }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
        run: npm run build
      - name: Upload dist via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./dist/
          # solvantapay.com/public_html = live web root on many SiteGround accounts (see DEPLOY-SITEGROUND.md)
          server-dir: ${{ vars.FTP_SERVER_DIR || './solvantapay.com/public_html/' }}
          dangerous-clean-slate: false
